name: text_repeater
description: Text repeater. Just Add text, Repeat & Share

publish_to: 'none'

version: 2.1.1+10 #02.07.25 17.09.24

environment:
  sdk: '>=3.3.0 <4.0.0'
  
dependency_overrides:
  path_provider_android: ^2.2.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: 
    sdk: flutter

  share_plus: ^12.0.1
  intl: ^0.20.2
  flutter_riverpod: ^2.5.1
  url_launcher: ^6.3.0
  google_mobile_ads: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

  flutter_native_splash: ^2.2.8
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/newIcon.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/

flutter_intl:
  enabled: true
